<!doctype html>
<html>
  <head>
    <title>Saved Offers</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
        min-height: 100vh;
      }
      h1 {
        font-size: 22px;
        color: #1e293b;
        margin: 0 0 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-size: 13px;
        font-weight: 600;
        text-align: left;
        padding: 12px 16px;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }
      th:hover {
        opacity: 0.85;
      }
      th .sort-arrow {
        margin-left: 4px;
        font-size: 10px;
      }
      td {
        padding: 10px 16px;
        font-size: 13px;
        color: #334155;
        border-bottom: 1px solid #f1f5f9;
      }
      thead tr {
        height: 44px;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .empty {
        text-align: center;
        color: #94a3b8;
        font-size: 14px;
        margin-top: 48px;
      }
      #searchBox {
        width: 100%;
        padding: 10px 14px;
        font-size: 13px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        margin-bottom: 12px;
        outline: none;
        transition: border-color 0.2s;
      }
      #searchBox:focus {
        border-color: #667eea;
      }
      #clearAll {
        margin-top: 16px;
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        background: white;
        color: #ef4444;
        border: 1px solid #fecaca;
        border-radius: 10px;
        transition: all 0.2s ease;
      }
      #clearAll:hover {
        background: #fef2f2;
        border-color: #f87171;
      }
    </style>
  </head>
  <body>
    <h1>Saved Offers</h1>
    <input type="text" id="searchBox" placeholder="Search offers..." />
    <div id="content"></div>
    <script src="saved-offers.js"></script>
  </body>
</html>
